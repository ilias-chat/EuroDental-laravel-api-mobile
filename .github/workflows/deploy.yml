name: Deploy Laravel Mobile API

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-laravel-mobile-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, xml, mbstring, ctype, fileinfo, openssl, pdo_mysql, tokenizer, bcmath, curl, json
          coverage: none
          tools: composer:v2

      - name: Build production .env
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_URL: ${{ secrets.APP_URL }}
          ASSET_URL: ${{ secrets.ASSET_URL }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
        run: php scripts/build-deploy-env.php

      - name: Composer install
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --no-scripts

      - name: Remove local Laravel caches before rsync
        run: rm -f bootstrap/cache/config.php bootstrap/cache/routes*.php bootstrap/cache/events.php

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Prepare SSH password file
        env:
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          printf '%s' "$SSH_PASSWORD" > .sshpass
          chmod 600 .sshpass

      - name: Sync to server
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          PHP_BIN: ${{ secrets.PHP_BIN }}
        run: |
          set -e
          export PHP_BIN="${PHP_BIN:-/usr/bin/php}"
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=60 -o ServerAliveInterval=30 -o ServerAliveCountMax=10"
          SSH_TARGET="${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
          SSH_PORT="${{ secrets.SSH_PORT }}"

          remote() {
            sshpass -f .sshpass ssh $SSH_OPTS -p "$SSH_PORT" "$SSH_TARGET" "$@"
          }

          for attempt in 1 2 3 4 5; do
            echo "Deploy attempt ${attempt}/5..."
            if remote "mkdir -p $(printf '%q' "$DEPLOY_PATH")" \
              && sshpass -f .sshpass rsync -avz --delete \
                --exclude-from=.rsync-exclude \
                -e "ssh $SSH_OPTS -p $SSH_PORT" \
                ./ "${SSH_TARGET}:${DEPLOY_PATH}/" \
              && remote "export DEPLOY_PATH=$(printf '%q' "$DEPLOY_PATH") PHP_BIN=$(printf '%q' "$PHP_BIN"); bash $(printf '%q' "$DEPLOY_PATH/scripts/remote-optimize.sh")"; then
              echo "Deploy succeeded on attempt ${attempt}."
              exit 0
            fi
            echo "Attempt ${attempt} failed, waiting 15s..."
            sleep 15
          done
          echo "Deploy failed after 5 attempts."
          exit 1

      - name: Remove SSH password file
        if: always()
        run: rm -f .sshpass

      - name: Verify health endpoint
        continue-on-error: true
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS --max-time 20 "https://mobile.eurodental.ma/up"; then
              echo "Health check OK"
              exit 0
            fi
            echo "Health check attempt $i failed, retrying..."
            sleep 10
          done
          echo "Health check failed (site may need document root = laravel-mobile/public)"
          exit 1
