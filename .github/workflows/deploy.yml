name: Deploy Laravel Mobile API

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-laravel-mobile-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, xml, mbstring, ctype, fileinfo, openssl, pdo_mysql, tokenizer, bcmath, curl, json
          coverage: none
          tools: composer:v2

      - name: Build production .env
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_URL: ${{ secrets.APP_URL }}
          ASSET_URL: ${{ secrets.ASSET_URL }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
        run: php scripts/build-deploy-env.php

      - name: Composer install
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --no-scripts

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Prepare SSH password file
        env:
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          printf '%s' "$SSH_PASSWORD" > .sshpass
          chmod 600 .sshpass

      - name: Ensure deploy directory exists
        run: |
          sshpass -f .sshpass ssh -o StrictHostKeyChecking=no -p "${{ secrets.SSH_PORT }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "mkdir -p '${{ secrets.DEPLOY_PATH }}'"

      - name: Rsync application to server
        run: |
          sshpass -f .sshpass rsync -avz --delete \
            --exclude-from=.rsync-exclude \
            -e "ssh -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT }}" \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Remove SSH password file
        if: always()
        run: rm -f .sshpass

      - name: Optimize Laravel on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            chmod 600 .env
            mkdir -p storage/framework/{cache,sessions,views} storage/logs bootstrap/cache
            chmod -R ug+rwx storage bootstrap/cache
            PHP_BIN="${{ secrets.PHP_BIN }}"
            if [ -z "$PHP_BIN" ]; then PHP_BIN="/usr/bin/php"; fi
            $PHP_BIN artisan config:clear
            $PHP_BIN artisan config:cache
            $PHP_BIN artisan route:cache
            $PHP_BIN artisan view:cache
            echo "Deploy finished."
