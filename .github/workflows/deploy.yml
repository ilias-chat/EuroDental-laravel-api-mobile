name: Deploy Laravel Mobile API

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-laravel-mobile-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, xml, mbstring, ctype, fileinfo, openssl, pdo_mysql, tokenizer, bcmath, curl, json
          coverage: none
          tools: composer:v2

      - name: Build production .env
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_URL: ${{ secrets.APP_URL }}
          ASSET_URL: ${{ secrets.ASSET_URL }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
        run: php scripts/build-deploy-env.php

      - name: Composer install
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --no-scripts

      - name: Remove local Laravel caches before rsync
        run: rm -f bootstrap/cache/config.php bootstrap/cache/routes*.php bootstrap/cache/events.php

      - name: Normalize shell scripts (LF)
        run: sed -i 's/\r$//' scripts/remote-optimize.sh

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Prepare SSH password file
        env:
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          printf '%s' "$SSH_PASSWORD" > .sshpass
          chmod 600 .sshpass

      - name: Ensure deploy directory exists
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=60 -o ServerAliveInterval=30"
          for attempt in 1 2 3 4 5; do
            if sshpass -f .sshpass ssh $SSH_OPTS -p "${{ secrets.SSH_PORT }}" \
              "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
              "mkdir -p $(printf '%q' "$DEPLOY_PATH")"; then
              exit 0
            fi
            sleep 15
          done
          exit 1

      - name: Rsync application to server
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=60 -o ServerAliveInterval=30"
          for attempt in 1 2 3 4 5; do
            if sshpass -f .sshpass rsync -avz --delete \
              --exclude-from=.rsync-exclude \
              -e "ssh $SSH_OPTS -p ${{ secrets.SSH_PORT }}" \
              ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${DEPLOY_PATH}/"; then
              exit 0
            fi
            sleep 15
          done
          exit 1

      - name: Optimize Laravel on server
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          PHP_BIN: ${{ secrets.PHP_BIN }}
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=60 -o ServerAliveInterval=30"
          REMOTE_CMD="export DEPLOY_PATH=$(printf '%q' "$DEPLOY_PATH"); export PHP_BIN=$(printf '%q' "${PHP_BIN:-}"); sh $(printf '%q' "$DEPLOY_PATH/scripts/remote-optimize.sh")"
          for attempt in 1 2 3; do
            echo "Optimize attempt ${attempt}/3..."
            if sshpass -f .sshpass ssh $SSH_OPTS -p "${{ secrets.SSH_PORT }}" \
              "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
              "$REMOTE_CMD"; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Remove SSH password file
        if: always()
        run: rm -f .sshpass

      - name: Verify health endpoint
        continue-on-error: true
        run: |
          curl -fS --max-time 20 "https://mobile.eurodental.ma/up" || echo "Note: set hPanel document root to laravel-mobile/public if /up fails"
