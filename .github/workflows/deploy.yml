name: Deploy Laravel Mobile API

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-laravel-mobile-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      # Password-only SSH (Hostinger). No ControlMaster — breaks rsync+sshpass.
      SSH_OPTS: >-
        -o StrictHostKeyChecking=no
        -o ConnectTimeout=30
        -o ServerAliveInterval=15
        -o ServerAliveCountMax=8
        -o TCPKeepAlive=yes
        -o PreferredAuthentications=password
        -o PubkeyAuthentication=no
        -o NumberOfPasswordPrompts=1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, xml, mbstring, ctype, fileinfo, openssl, pdo_mysql, tokenizer, bcmath, curl, json
          coverage: none
          tools: composer:v2

      - name: Build production .env
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_URL: ${{ secrets.APP_URL }}
          ASSET_URL: ${{ secrets.ASSET_URL }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
        run: php scripts/build-deploy-env.php

      - name: Validate Composer lock
        run: composer validate --no-check-publish --no-interaction

      - name: Remove local Laravel caches before rsync
        run: rm -f bootstrap/cache/config.php bootstrap/cache/routes*.php bootstrap/cache/events.php

      - name: Normalize shell scripts (LF)
        run: sed -i 's/\r$//' scripts/remote-optimize.sh

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Prepare SSH password file
        env:
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          printf '%s' "$SSH_PASSWORD" > .sshpass
          chmod 600 .sshpass

      - name: Test SSH connection
        run: |
          TARGET="${SSH_USER}@${SSH_HOST}"
          echo "SSH target: ${TARGET} port ${SSH_PORT}"
          sshpass -f .sshpass ssh $SSH_OPTS -p "$SSH_PORT" "$TARGET" "echo SSH_OK && uptime"

      - name: Rsync application to server
        run: |
          TARGET="${SSH_USER}@${SSH_HOST}"
          REMOTE="${TARGET}:${DEPLOY_PATH}/"

          sshpass -f .sshpass ssh $SSH_OPTS -p "$SSH_PORT" "$TARGET" \
            "mkdir -p $(printf '%q' "$DEPLOY_PATH")"

          for attempt in 1 2; do
            echo "Rsync attempt ${attempt}/2 → ${REMOTE}"
            if sshpass -f .sshpass rsync -avz --delete --info=stats2 \
              --partial --delay-updates \
              --contimeout=30 --timeout=600 \
              --exclude-from=.rsync-exclude \
              -e "ssh $SSH_OPTS -p $SSH_PORT" \
              ./ "$REMOTE"; then
              echo "Rsync finished successfully."
              exit 0
            fi
            echo "Rsync failed (SSH exit 255 = connection/auth). Retrying in 15s..."
            sshpass -f .sshpass ssh $SSH_OPTS -p "$SSH_PORT" "$TARGET" "echo SSH still up" || true
            sleep 15
          done
          exit 1

      - name: Finalize deploy on server
        env:
          PHP_BIN: ${{ secrets.PHP_BIN }}
          PUBLIC_HTML_PATH: ${{ secrets.PUBLIC_HTML_PATH }}
        run: |
          TARGET="${SSH_USER}@${SSH_HOST}"
          REMOTE_CMD="export DEPLOY_PATH=$(printf '%q' "$DEPLOY_PATH"); export PHP_BIN=$(printf '%q' "${PHP_BIN:-}"); export PUBLIC_HTML_PATH=$(printf '%q' "${PUBLIC_HTML_PATH:-}"); sh $(printf '%q' "$DEPLOY_PATH/scripts/remote-optimize.sh")"
          OK=0
          for attempt in 1 2; do
            echo "Finalize attempt ${attempt}/2..."
            if sshpass -f .sshpass ssh $SSH_OPTS -p "$SSH_PORT" "$TARGET" "$REMOTE_CMD"; then
              OK=1
              break
            fi
            sleep 15
          done
          echo "========== SERVER DEPLOY DEBUG LOG =========="
          sshpass -f .sshpass scp $SSH_OPTS -P "$SSH_PORT" \
            "${TARGET}:${DEPLOY_PATH}/deploy-debug.txt" ./deploy-debug.txt 2>/dev/null || true
          if [ -f deploy-debug.txt ]; then cat deploy-debug.txt; else echo "(no deploy-debug.txt)"; fi
          echo "========== LARAVEL LOG (tail) =========="
          sshpass -f .sshpass ssh $SSH_OPTS -p "$SSH_PORT" "$TARGET" \
            "tail -n 80 $(printf '%q' "$DEPLOY_PATH/storage/logs/laravel.log") 2>/dev/null || echo '(no laravel.log yet)'" || true
          echo "=============================================="
          if [ "$OK" = "1" ]; then exit 0; fi
          exit 1

      - name: Cleanup deploy secrets
        if: always()
        run: rm -f .sshpass

      - name: Verify health endpoint
        continue-on-error: true
        run: |
          echo "=== deploy check.php ==="
          curl -sS --max-time 25 "https://mobile.eurodental.ma/check.php" || true
          echo ""
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /tmp/up-body.txt -w "%{http_code}" --max-time 25 "https://mobile.eurodental.ma/up" || echo "000")
            echo "HTTP $code"
            head -c 400 /tmp/up-body.txt 2>/dev/null || true
            echo ""
            if [ "$code" = "200" ]; then
              echo "Health check OK"
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed — see Finalize step logs (DB secrets or PHP version)"
          exit 1
