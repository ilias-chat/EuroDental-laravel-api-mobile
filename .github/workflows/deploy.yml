name: Deploy Laravel Mobile API

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-laravel-mobile-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, fileinfo, openssl, pdo_mysql, tokenizer, bcmath
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Build production .env
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_URL: ${{ secrets.APP_URL }}
          ASSET_URL: ${{ secrets.ASSET_URL }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
        run: |
          APP_URL="${APP_URL:-https://mobile.eurodental.ma}"
          ASSET_URL="${ASSET_URL:-https://eurodental.ma}"
          {
            echo 'APP_NAME="EuroDental Mobile API"'
            echo 'APP_ENV=production'
            echo "APP_KEY=${APP_KEY}"
            echo 'APP_DEBUG=false'
            echo "APP_URL=${APP_URL}"
            echo ''
            echo 'LOG_CHANNEL=stack'
            echo 'LOG_LEVEL=error'
            echo ''
            echo 'DB_CONNECTION=mysql'
            echo "DB_HOST=${DB_HOST}"
            echo "DB_PORT=${DB_PORT}"
            echo "DB_DATABASE=${DB_DATABASE}"
            echo "DB_USERNAME=${DB_USERNAME}"
            echo "DB_PASSWORD=${DB_PASSWORD}"
            echo ''
            echo 'SESSION_DRIVER=file'
            echo 'SESSION_LIFETIME=120'
            echo 'CACHE_STORE=file'
            echo 'QUEUE_CONNECTION=sync'
            echo 'FILESYSTEM_DISK=local'
            echo ''
            echo "ASSET_URL=${ASSET_URL}"
            echo "CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}"
          } > .env

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure deploy directory exists
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "mkdir -p '${{ secrets.DEPLOY_PATH }}'"

      - name: Rsync application to server
        run: |
          rsync -avz --delete \
            --exclude-from=.rsync-exclude \
            -e "ssh -p ${{ secrets.SSH_PORT }}" \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Optimize Laravel on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            chmod 600 .env
            mkdir -p storage/framework/{cache,sessions,views} storage/logs bootstrap/cache
            chmod -R ug+rwx storage bootstrap/cache
            PHP_BIN="${{ secrets.PHP_BIN }}"
            if [ -z "$PHP_BIN" ]; then PHP_BIN="/usr/bin/php"; fi
            $PHP_BIN artisan config:clear
            $PHP_BIN artisan config:cache
            $PHP_BIN artisan route:cache
            $PHP_BIN artisan view:cache
            echo "Deploy finished."
